version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: sss_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-stablecoin_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d stablecoin_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
